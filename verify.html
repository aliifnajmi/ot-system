<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lulus OT — Sistem OT Mulia Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="app">
  <main class="main" id="main-content">

    <div class="page-header">
      <div>
        <h2>Lulus / Tolak OT</h2>
        <p>Semak dan proses permohonan kerja lebih masa yang tertunggak</p>
      </div>
      <div class="page-actions no-print">
        <button class="btn btn-success" id="approve-all-btn" onclick="approveAll()" disabled>
          <i class="ti ti-checks" aria-hidden="true"></i> Lulus Semua Terpilih
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs no-print">
      <button class="tab active" onclick="setTab('pending', this)">
        Menunggu <span id="pending-count" style="background:#fef9e7;color:#7d6608;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px;"></span>
      </button>
      <button class="tab" onclick="setTab('approved', this)">Diluluskan</button>
      <button class="tab" onclick="setTab('rejected', this)">Ditolak</button>
      <button class="tab" onclick="setTab('all', this)">Semua</button>
    </div>

    <!-- Select all bar -->
    <div id="select-bar" style="display:flex;align-items:center;gap:12px;padding:10px 0;margin-bottom:8px;border-bottom:1px solid var(--border);">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
        <input type="checkbox" id="select-all" onchange="toggleSelectAll(this.checked)" style="width:15px;height:15px;" aria-label="Pilih semua">
        Pilih Semua
      </label>
      <span id="selected-count" style="font-size:12px;color:var(--text-muted);">0 dipilih</span>
    </div>

    <div id="verify-list">
      <div class="empty-state"><i class="ti ti-loader" style="font-size:40px;" aria-hidden="true"></i><p>Memuatkan...</p></div>
    </div>

  </main>
</div>

<!-- Reject Reason Modal -->
<div class="modal-overlay" id="reject-modal" role="dialog" aria-modal="true" aria-labelledby="reject-title">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <h4 id="reject-title">Tolak Permohonan OT</h4>
      <button class="btn btn-icon btn-outline" onclick="closeRejectModal()" aria-label="Tutup"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body">
      <p style="font-size:13.5px;color:var(--text-secondary);margin-bottom:14px;">Nyatakan sebab penolakan permohonan OT ini.</p>
      <div class="form-group">
        <label class="form-label" for="reject-reason">Sebab Penolakan <span class="required">*</span></label>
        <textarea class="form-control" id="reject-reason" rows="3" placeholder="Masukkan sebab penolakan..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeRejectModal()">Batal</button>
      <button class="btn btn-danger" id="confirm-reject-btn" onclick="confirmReject()">
        <i class="ti ti-circle-x" aria-hidden="true"></i> Sahkan Tolak
      </button>
    </div>
  </div>
</div>

<div id="toast-container" aria-live="polite"></div>
<script src="config/config.js"></script>
<script src="assets/js/layout.js"></script>
<script>
buildLayout('verify', 'Lulus / Tolak OT');

let allRecords = [], currentTab = 'pending', pendingRejectId = null;
let selected = new Set();

async function loadRecords() {
  Utils.showLoading();
  try {
    const data = await API.get('getOTRecords');
    allRecords = data.records || [];
  } catch {
    allRecords = getSampleRecords();
  } finally {
    Utils.hideLoading();
    renderList();
  }
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  selected.clear();
  renderList();
}

function renderList() {
  const list = currentTab === 'all' ? allRecords : allRecords.filter(r => r.status === currentTab);
  const pending = allRecords.filter(r => r.status === 'pending');
  document.getElementById('pending-count').textContent = pending.length;
  updateSelectBar();

  if (!list.length) {
    document.getElementById('verify-list').innerHTML = `
      <div class="empty-state" style="padding:48px;">
        <i class="ti ti-${currentTab==='pending'?'clock-check':'inbox'}" style="font-size:48px;" aria-hidden="true"></i>
        <h4>${currentTab==='pending'?'Tiada permohonan tertunggak':'Tiada rekod ditemui'}</h4>
        <p>${currentTab==='pending'?'Semua permohonan OT telah diproses.':'Tiada rekod untuk tab ini.'}</p>
      </div>`;
    return;
  }

  const typeLabel = { weekday:'Hari Bekerja • 1.5×', weekend:'Hujung Minggu • 2.0×', holiday:'Cuti Umum • 3.0×' };
  document.getElementById('verify-list').innerHTML = list.map(r => `
    <div class="card" style="margin-bottom:12px;border-left:4px solid ${r.status==='pending'?'#c8a44a':r.status==='approved'?'#1a7a45':'#c0392b'};">
      <div class="card-body" style="padding:16px 20px;">
        <div style="display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;">
          ${r.status === 'pending' ? `<input type="checkbox" style="margin-top:4px;width:15px;height:15px;flex-shrink:0;" data-id="${r.id}" onchange="toggleSelect('${r.id}',this.checked)" aria-label="Pilih ${r.workerName}">` : '<div style="width:15px;"></div>'}
          <div style="flex:1;min-width:200px;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;">
              <strong style="font-size:15px;">${r.workerName}</strong>
              ${Utils.badgeHTML(r.status)}
              <span style="font-size:12px;color:var(--text-muted);font-family:monospace;">${r.id}</span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:6px;font-size:12.5px;color:var(--text-secondary);">
              <span><i class="ti ti-building" style="font-size:13px;" aria-hidden="true"></i> ${r.department}</span>
              <span><i class="ti ti-calendar" style="font-size:13px;" aria-hidden="true"></i> ${Utils.formatDate(r.date)}</span>
              <span><i class="ti ti-clock" style="font-size:13px;" aria-hidden="true"></i> ${Number(r.hours).toFixed(1)} jam</span>
              <span><i class="ti ti-currency-ringgit" style="font-size:13px;" aria-hidden="true"></i> ${Utils.formatCurrency(r.otAmount)}</span>
            </div>
            <div style="margin-top:8px;font-size:12.5px;color:var(--text-secondary);">
              <i class="ti ti-tag" style="font-size:13px;" aria-hidden="true"></i> ${typeLabel[r.type]||r.type}
            </div>
            <div style="margin-top:6px;padding:8px 12px;background:var(--bg);border-radius:6px;font-size:12.5px;color:var(--text-secondary);line-height:1.5;">
              <i class="ti ti-message" style="font-size:13px;" aria-hidden="true"></i> <em>${r.reason || '—'}</em>
            </div>
            ${r.rejectReason ? `<div style="margin-top:6px;padding:8px 12px;background:#fce8e6;border-radius:6px;font-size:12.5px;color:var(--danger);"><i class="ti ti-circle-x" aria-hidden="true"></i> Sebab Tolak: ${r.rejectReason}</div>` : ''}
          </div>
          ${r.status === 'pending' ? `
          <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;" class="no-print">
            <button class="btn btn-success btn-sm" onclick="approveOne('${r.id}')">
              <i class="ti ti-circle-check" aria-hidden="true"></i> Lulus
            </button>
            <button class="btn btn-danger btn-sm" onclick="openRejectModal('${r.id}')">
              <i class="ti ti-circle-x" aria-hidden="true"></i> Tolak
            </button>
          </div>` : ''}
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--text-muted);text-align:right;">
          Dihantar: ${Utils.formatDateTime(r.submittedAt)}
          ${r.processedAt ? ` • Diproses: ${Utils.formatDateTime(r.processedAt)}` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleSelect(id, checked) {
  if (checked) selected.add(id);
  else selected.delete(id);
  updateSelectBar();
}

function toggleSelectAll(checked) {
  const checkboxes = document.querySelectorAll('[data-id]');
  checkboxes.forEach(cb => {
    cb.checked = checked;
    if (checked) selected.add(cb.dataset.id);
    else selected.delete(cb.dataset.id);
  });
  updateSelectBar();
}

function updateSelectBar() {
  document.getElementById('selected-count').textContent = `${selected.size} dipilih`;
  document.getElementById('approve-all-btn').disabled = selected.size === 0;
}

async function approveOne(id) {
  await processOT(id, 'approved', '');
}

async function approveAll() {
  if (!selected.size) return;
  if (!confirm(`Lulus ${selected.size} permohonan OT?`)) return;
  for (const id of selected) await processOT(id, 'approved', '', false);
  Utils.toast(`${selected.size} permohonan OT diluluskan!`, 'success');
  selected.clear();
  renderList();
}

function openRejectModal(id) {
  pendingRejectId = id;
  document.getElementById('reject-reason').value = '';
  document.getElementById('reject-modal').classList.add('open');
}

function closeRejectModal() {
  document.getElementById('reject-modal').classList.remove('open');
  pendingRejectId = null;
}

async function confirmReject() {
  const reason = document.getElementById('reject-reason').value.trim();
  if (!reason) { Utils.toast('Sila nyatakan sebab penolakan.', 'warning'); return; }
  const btn = document.getElementById('confirm-reject-btn');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" aria-hidden="true"></i> Memproses...';
  await processOT(pendingRejectId, 'rejected', reason);
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-circle-x" aria-hidden="true"></i> Sahkan Tolak';
  closeRejectModal();
}

async function processOT(id, status, reason, showToast = true) {
  const rec = allRecords.find(r => r.id === id);
  if (!rec) return;
  try {
    await API.post('processOT', { id, status, reason, processedAt: new Date().toISOString(), processedBy: 'Admin HR' });
  } catch { /* demo mode */ }
  rec.status = status;
  rec.rejectReason = reason;
  rec.processedAt = new Date().toISOString();
  if (showToast) Utils.toast(status === 'approved' ? 'OT diluluskan!' : 'OT ditolak.', status === 'approved' ? 'success' : 'error');
  renderList();
}

function getSampleRecords() {
  return [
    { id:'OT-A001', workerName:'Ahmad Fadzil bin Hassan', department:'Operasi & Penyelenggaraan', date:'2025-06-21', type:'weekday', hours:3, otAmount:251.90, reason:'Mengurus penyelenggaraan sistem elektrik bangunan.', status:'pending', submittedAt:'2025-06-21T20:30:00Z' },
    { id:'OT-A002', workerName:'Siti Aminah binti Razak', department:'Jualan & Pemasaran', date:'2025-06-20', type:'weekend', hours:4, otAmount:405.60, reason:'Persediaan pameran hartanah MAPEX 2025.', status:'pending', submittedAt:'2025-06-20T18:00:00Z' },
    { id:'OT-A003', workerName:'Raj Kumar a/l Subramaniam', department:'Projek & Pembangunan', date:'2025-06-19', type:'weekday', hours:2.5, otAmount:223.60, reason:'Menyiapkan lukisan pelan fasa 3 sebelum tarikh akhir.', status:'pending', submittedAt:'2025-06-19T21:00:00Z' },
    { id:'OT-A004', workerName:'Noraini binti Ali', department:'Kewangan & Akaun', date:'2025-06-18', type:'weekday', hours:3, otAmount:221.00, reason:'Penyediaan laporan kewangan bulanan Jun 2025.', status:'approved', submittedAt:'2025-06-18T19:45:00Z', processedAt:'2025-06-19T09:00:00Z' },
    { id:'OT-A005', workerName:'Hazwan Hafiz bin Zakaria', department:'IT & Sistem', date:'2025-06-17', type:'weekend', hours:4, otAmount:484.56, reason:'Pengemaskinian server dan backup data sistem OT.', status:'rejected', submittedAt:'2025-06-17T20:00:00Z', processedAt:'2025-06-18T08:30:00Z', rejectReason:'Kerja pengemaskinian perlu dilakukan pada hari bekerja dan mendapat kelulusan awal.' },
  ];
}

window.addEventListener('load', loadRecords);
</script>
</body>
</html>
